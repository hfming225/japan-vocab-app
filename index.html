<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Word Learner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxG7GluZr5vDipEuSP2WsLUiBDNYfImtc",
            authDomain: "japan-word-923b2.firebaseapp.com",
            projectId: "japan-word-923b2",
            storageBucket: "japan-word-923b2.firebasestorage.app",
            messagingSenderId: "415963978132",
            appId: "1:415963978132:web:0fe0aaa853a4b6e8691781"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI State
        let currentUser = null;
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const kanbanBoard = document.getElementById('kanban-board');
        const addWordForm = document.getElementById('add-word-form');

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                loadWords();
            } else {
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                kanbanBoard.innerHTML = '<p class="text-center p-4">Please log in to start learning.</p>';
            }
        });

        loginBtn.onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        logoutBtn.onclick = () => signOut(auth);

        async function loadWords() {
            const q = query(collection(db, "words"), where("uid", "==", currentUser.uid));
            const snapshot = await getDocs(q);
            const words = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderKanban(words);
        }

        function renderKanban(words) {
            const learning = words.filter(w => !w.learned);
            const learned = words.filter(w => w.learned);
            
            document.getElementById('learning-col').innerHTML = learning.map(w => wordCard(w)).join('');
            document.getElementById('learned-col').innerHTML = learned.map(w => wordCard(w)).join('');
        }

        function wordCard(word) {
            return `
                <div class="bg-white p-3 mb-2 rounded shadow text-sm border-l-4 ${word.learned ? 'border-green-500' : 'border-blue-500'}">
                    <div class="flex justify-between">
                        <h4 class="font-bold text-lg">${word.kanji}</h4>
                        <button onclick="speak('${word.kanji}')" class="text-blue-500">🔊</button>
                    </div>
                    <p class="text-gray-600">${word.meaning}</p>
                    ${!word.learned ? `<button onclick="markLearned('${word.id}')" class="mt-2 text-xs text-green-600 font-bold">Done ✅</button>` : ''}
                </div>
            `;
        }

        window.speak = (text) => {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ja-JP';
            window.speechSynthesis.speak(msg);
        };

        window.markLearned = async (id) => {
            await updateDoc(doc(db, "words", id), { learned: true });
            loadWords();
        };

        addWordForm.onsubmit = async (e) => {
            e.preventDefault();
            const today = new Date().toISOString().split('T')[0];
            const q = query(collection(db, "words"), where("uid", "==", currentUser.uid), where("date", "==", today));
            const count = (await getDocs(q)).size;

            if (count >= 10) {
                alert("Daily limit of 10 words reached!");
                return;
            }

            await addDoc(collection(db, "words"), {
                uid: currentUser.uid,
                kanji: e.target.kanji.value,
                meaning: e.target.meaning.value,
                learned: false,
                date: today,
                createdAt: serverTimestamp()
            });
            e.target.reset();
            loadWords();
        };
    </script>
</head>
<body class="bg-gray-100 p-4">
    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Japanese Learner</h1>
        <div>
            <button id="login-btn" class="bg-blue-500 text-white px-4 py-2 rounded">Login</button>
            <button id="logout-btn" class="hidden bg-red-500 text-white px-4 py-2 rounded">Logout</button>
        </div>
    </header>

    <form id="add-word-form" class="bg-white p-4 rounded shadow mb-6 flex gap-2">
        <input name="kanji" placeholder="Kanji" class="border p-2 flex-grow" required>
        <input name="meaning" placeholder="Meaning" class="border p-2 flex-grow" required>
        <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded">Add</button>
    </form>

    <div id="kanban-board" class="grid grid-cols-2 gap-4">
        <div>
            <h2 class="font-bold text-center mb-2">Learning</h2>
            <div id="learning-col"></div>
        </div>
        <div>
            <h2 class="font-bold text-center mb-2">Learned</h2>
            <div id="learned-col"></div>
        </div>
    </div>
</body>
</html>
