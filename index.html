<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Vocabulary Kanban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, deleteDoc, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // TODO: Please fill in the 'messagingSenderId' from your Firebase Project Settings
        const firebaseConfig = {
            apiKey: "AIzaSyBxG7GluZr5vDipEuSP2WsLUiBDNYfImtc",
            authDomain: "japan-word-923b2.firebaseapp.com",
            projectId: "japan-word-923b2",
            storageBucket: "japan-word-923b2.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID", 
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let allWords = [];

        // --- UI Elements ---
        const appDiv = document.getElementById('app');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const wordListDiv = document.getElementById('word-list');
        const searchInput = document.getElementById('search-input');
        const dailyLimitMsg = document.getElementById('daily-limit-msg');

        // --- Auth Logic ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                await loadWords();
            } else {
                currentUser = null;
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                wordListDiv.innerHTML = '<p class="text-gray-500 text-center">Please sign in to manage your vocabulary.</p>';
                dailyLimitMsg.style.display = 'none';
            }
        });

        loginBtn.addEventListener('click', () => signInWithPopup(auth, provider));
        logoutBtn.addEventListener('click', () => signOut(auth));

        // --- Firestore Logic ---
        async function loadWords() {
            if (!currentUser) return;
            wordListDiv.innerHTML = '<p class="text-center loading">Loading...</p>';
            
            const q = query(collection(db, "users", currentUser.uid, "words"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            allWords = [];
            snapshot.forEach((doc) => {
                allWords.push(doc.data()); // Note: id is doc.id, we keep it for updates
            });

            // Sort in-memory to ensure order if needed
            // Render logic
            renderKanban(allWords, searchInput.value);
            checkDailyLimit();
        }

        async function checkDailyLimit() {
            const today = new Date().toLocaleDateString(); // Simple date string for limit check
            const q = query(collection(db, "users", currentUser.uid, "words"), where("date", "==", today));
            const snapshot = await getDocs(q);
            
            dailyLimitMsg.style.display = 'block';
            dailyLimitMsg.textContent = `Daily Progress: ${snapshot.size} / 10 words`;
            dailyLimitMsg.className = "text-sm mb-2 text-gray-500";

            if (snapshot.size >= 10) {
                document.getElementById('add-word-form').classList.add('opacity-50', 'pointer-events-none');
                dailyLimitMsg.className = "text-sm mb-2 text-red-500 font-bold";
            } else {
                document.getElementById('add-word-form').classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        async function addWord(wordData) {
            if (!currentUser) return;
            await addDoc(collection(db, "users", currentUser.uid, "words"), {
                ...wordData,
                date: new Date().toLocaleDateString(), // For daily limit counting
                status: 'learning',
                userId: currentUser.uid,
                createdAt: Timestamp.now()
            });
            await loadWords();
            document.getElementById('word-input').value = ''; // Reset form
        }

        async function updateStatus(id, newStatus) {
            const docRef = doc(db, "users", currentUser.uid, "words", id);
            await updateDoc(docRef, { status: newStatus });
        }

        async function deleteWord(id) {
            if(confirm("Are you sure?")) {
                await deleteDoc(doc(db, "users", currentUser.uid, "words", id));
                await loadWords();
            }
        }

        async function learnWord(id) {
            await updateStatus(id, 'learned');
        }

        // --- UI Rendering ---
        renderKanban = (words, filter = "") => {
            const learningWords = words.filter(w => w.status === 'learning' && (w.title.toLowerCase().includes(filter.toLowerCase()) || w.reading.toLowerCase().includes(filter.toLowerCase())));
            const learnedWords = words.filter(w => w.status === 'learned' && (w.title.toLowerCase().includes(filter.toLowerCase()) || w.reading.toLowerCase().includes(filter.toLowerCase())));

            wordListDiv.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Learning Column -->
                    <div class="bg-gray-200 p-4 rounded-lg">
                        <h2 class="font-bold mb-2">Learning (${learningWords.length})</h2>
                        ${learningWords.map(w => createWordCard(w, 'learning')).join('')}
                    </div>
                    <!-- Learned Column -->
                    <div class="bg-green-100 p-4 rounded-lg">
                        <h2 class="font-bold mb-2">Learned (${learnedWords.length})</h2>
                        ${learnedWords.map(w => createWordCard(w, 'learned')).join('')}
                    </div>
                </div>
            `;
        };

        createWordCard = (w, status) => `
            <div class="bg-white p-3 rounded shadow mb-2 flex justify-between items-center group">
                <div onclick="window.speak('${w.reading.replace(/'/g, "\\'")}')" class="cursor-pointer hover:text-blue-500">
                    <span class="text-2xl block">${w.title}</span>
                    <span class="text-xs text-gray-500">${w.reading} - ${w.meaning}</span>
                </div>
                <div class="space-x-1 opacity-0 group-hover:opacity-100 transition">
                    ${status === 'learning' ? `<button onclick="window.learnWord('${w.id}')" class="text-green-600">✅</button>` : ''}
                    <button onclick="window.deleteWord('${w.id}')" class="text-red-500">🗑️</button>
                </div>
            </div>
        `;

        // Expose to window for inline onclick
        window.learnWord = learnWord;
        window.deleteWord = deleteWord;
        window.speak = (text) => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            speechSynthesis.speak(utterance);
        };

        // Search Listener
        searchInput.addEventListener('input', (e) => renderKanban(allWords, e.target.value));

        // Add Listener
        document.getElementById('add-btn').addEventListener('click', () => {
            const title = document.getElementById('word-input-title').value;
            const reading = document.getElementById('word-input-reading').value;
            const meaning = document.getElementById('word-input-meaning').value;
            if (title && reading) {
                addWord({ title, reading, meaning });
            }
        });

    </script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="app" class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Kanban Vocabulary</h1>
            <div>
                <button id="login-btn" class="bg-blue-600 text-white px-4 py-2 rounded">Login</button>
                <button id="logout-btn" class="hidden bg-gray-600 text-white px-4 py-2 rounded">Logout</button>
            </div>
        </div>

        <!-- Add Word Form -->
        <div id="add-word-form" class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-xl font-bold mb-4">Add New Word</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input id="word-input-title" class="border p-2 rounded" placeholder="Kanji (e.g. 猫)">
                <input id="word-input-reading" class="border p-2 rounded" placeholder="Reading (e.g. ねこ)">
                <input id="word-input-meaning" class="border p-2 rounded" placeholder="Meaning (e.g. Cat)">
            </div>
            <button id="add-btn" class="mt-4 bg-green-600 text-white px-4 py-2 rounded">Add to Learning</button>
        </div>

        <!-- Daily Limit -->
        <div id="daily-limit-msg" class="mb-4"></div>

        <!-- Search -->
        <input id="search-input" class="w-full p-3 mb-6 border rounded" placeholder="Search words...">

        <!-- Kanban Board -->
        <div id="word-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <p class="text-gray-500 text-center col-span-2">Please login to see your board.</p>
        </div>
    </div>
</body>
</html>
